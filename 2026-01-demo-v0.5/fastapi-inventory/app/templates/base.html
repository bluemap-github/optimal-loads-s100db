<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ title or "Inventory" }}</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
    .wrap { max-width: 1500px; margin: 0 auto; }
    .card { border:1px solid #e5e7eb; border-radius:12px; padding:16px; }
    table { width:100%; border-collapse: collapse; }
    th, td { padding: 8px 10px; border-bottom:1px solid #eee; font-size: 0.94rem; }
    th { text-align:left; background:#fafafa; }
    .row { display:flex; gap:12px; flex-wrap: wrap; }
    select, input { padding:6px 8px; border:1px solid #ddd; border-radius:8px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .pagination a { margin: 0 6px; text-decoration: none; }
    .muted { color:#6b7280; font-size:0.9rem; }
    .toolbar{display:flex;gap:8px;justify-content:flex-end;align-items:center;padding:10px 0 6px;}
    .btn{display:inline-block;font-size:13px;padding:6px 10px;border-radius:8px;text-decoration:none;
        border:1px solid var(--border,#e2e8f0);background:#fff;color:var(--text,#0f172a)}
    .btn-outline{border-color:var(--brand,#0284c7);color:var(--brand,#0284c7);background:#fff}
    .btn-outline:hover{background:#e0f4ff}
    .btn-primary{border-color:var(--brand,#0284c7);background:var(--brand,#0284c7);color:#fff}
    .btn-primary:hover{filter:brightness(0.97)}
  </style>
</head>
<body>
  <div class="toolbar" style="display:flex;gap:8px;justify-content:flex-end;align-items:center;padding:10px 0 6px;">
    <a class="btn-outline btn" href="/" aria-label="Switch to English">Manual</a>
    <a class="btn-outline btn" href="/docs" aria-label="Import Data">API Documentation</a>
  </div>
  <div class="wrap">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
